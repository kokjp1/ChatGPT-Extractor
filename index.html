<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT naar JSON Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #202123;
            color: #ececf1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #343541;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 { margin-top: 0; color: #fff; }
        p { color: #c5c5d2; line-height: 1.5; }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-top: 20px;
        }
        .btn {
            border: none;
            color: white;
            background-color: #10a37f;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #0b8c6d; }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        #status { margin-top: 20px; font-weight: bold; color: #10a37f; }
    </style>
</head>
<body>

<div class="container">
    <h1>ChatGPT JSON Extractor</h1>
    <p>Selecteer je opgeslagen ChatGPT HTML-bestand. Alles gebeurt lokaal in je browser, dus je chat blijft 100% privé.</p>
    
    <div class="upload-btn-wrapper">
        <button class="btn">Selecteer HTML Bestand</button>
        <input type="file" id="fileInput" accept=".htm,.html" />
    </div>
    
    <div id="status"></div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Bestand aan het verwerken...";
        statusDiv.style.color = "#c5c5d2";

        const reader = new FileReader();
        reader.onload = function(e) {
            const htmlContent = e.target.result;
            
            // Maak een virtueel DOM-element aan om de HTML te lezen
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlContent, 'text/html');
            
            const messages = [];
            const messageNodes = doc.querySelectorAll('div[data-message-author-role]');
            
            messageNodes.forEach(node => {
                const role = node.getAttribute('data-message-author-role');
                let contentDiv;
                
                if (role === 'user') {
                    contentDiv = node.querySelector('div.whitespace-pre-wrap');
                } else {
                    contentDiv = node.querySelector('div.markdown');
                }
                
                if (contentDiv) {
                    messages.push({
                        role: role,
                        content: contentDiv.innerText.trim()
                    });
                }
            });

            if (messages.length > 0) {
                // Maak de JSON en start de download
                const jsonString = JSON.stringify(messages, null, 4);
                const blob = new Blob([jsonString], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name.replace(/\.[^/.]+$/, "") + "_schoon.json";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                statusDiv.innerText = `Klaar! ${messages.length} berichten omgezet en gedownload.`;
                statusDiv.style.color = "#10a37f";
            } else {
                statusDiv.innerText = "Oeps! Geen berichten gevonden in dit bestand.";
                statusDiv.style.color = "#ef4444";
            }
        };
        reader.readAsText(file);
    });
</script>

</body>
</html>
